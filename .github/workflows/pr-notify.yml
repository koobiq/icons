name: Notification PR

on:
  # WARNING: `pull_request_target` runs with write permissions and access to secrets
  # even for PRs from forks. Never checkout untrusted PR code or run it in this workflow,
  # as that would allow a malicious contributor to exfiltrate secrets or modify the repo.
  # Safe here only because no code is checked out — only GitHub context metadata is used.
  pull_request_target:
    types:
      - opened

jobs:
  notify:
    name: Pull Request Notification
    runs-on: ubuntu-latest
    env:
      TEXT: |
        [${{ github.repository }}] | [${{ github.event.pull_request.title }} #${{ github.event.number }}](https://github.com/${{ github.repository }}/pull/${{ github.event.number }}) was created by ${{ github.actor }}
    steps:
      - name: Notification to main channel
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: mattermost/action-mattermost-notify@v2.1.0
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
          MATTERMOST_CHANNEL: ${{ secrets.MM_CHANNEL_NAME }}
          MATTERMOST_USERNAME: ${{ secrets.MM_BOT_NAME }}
          TEXT: ${{ env.TEXT }}

      - name: Notification to dev channel
        uses: mattermost/action-mattermost-notify@v2.1.0
        with:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
          MATTERMOST_CHANNEL: ${{ secrets.MM_CHANNEL_BOT_PR }}
          MATTERMOST_USERNAME: ${{ secrets.MM_BOT_NAME }}
          TEXT: ${{ env.TEXT }}
